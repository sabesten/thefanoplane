<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <linearGradient id="sphereGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ff7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5ba8f7" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- S7 sphere -->
  <ellipse cx="70" cy="80" rx="50" ry="50" fill="url(#sphereGrad)" stroke="#7c6ff7" stroke-width="1.5"/>
  <text x="70" y="76" text-anchor="middle" fill="#e8e6f0" font-size="18" font-family="serif" font-style="italic">S</text>
  <text x="82" y="82" text-anchor="middle" fill="#e8e6f0" font-size="12" font-family="serif">7</text>
  <text x="70" y="140" text-anchor="middle" fill="#6b6890" font-size="11" font-family="sans-serif">Spin(7)/G₂</text>
  
  <!-- Arrow -->
  <line x1="135" y1="80" x2="185" y2="80" stroke="#7c6ff7" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c6ff7"/>
    </marker>
  </defs>
  <text x="160" y="70" text-anchor="middle" fill="#7c6ff7" font-size="10" font-family="sans-serif">G₂-equiv</text>
  
  <!-- Z7^3 lattice -->
  <rect x="200" y="30" width="90" height="100" rx="4" fill="none" stroke="#5ba8f7" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Grid dots -->
  <circle cx="220" cy="50" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="240" cy="50" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="260" cy="50" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="220" cy="70" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="240" cy="70" r="3" fill="#5ba8f7" opacity="0.9"/>
  <circle cx="260" cy="70" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="220" cy="90" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="240" cy="90" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="260" cy="90" r="3" fill="#7c6ff7" opacity="0.7"/>
  <circle cx="270" cy="60" r="2.5" fill="#7c6ff7" opacity="0.5"/>
  <circle cx="280" cy="80" r="2.5" fill="#7c6ff7" opacity="0.5"/>
  <circle cx="250" cy="110" r="2.5" fill="#7c6ff7" opacity="0.5"/>
  <text x="245" y="76" text-anchor="middle" fill="#e8e6f0" font-size="14" font-family="serif" font-style="italic">ℤ</text>
  <text x="257" y="82" text-anchor="middle" fill="#e8e6f0" font-size="9" font-family="serif">7</text>
  <text x="265" y="76" text-anchor="middle" fill="#e8e6f0" font-size="14" font-family="serif" font-style="italic">³</text>
</svg>
